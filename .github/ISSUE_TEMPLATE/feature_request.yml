name: Feature request
description: An idea for a new feature or an improvement to an existing one
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem you want to solve
      description: What would this feature help with? What are you currently doing manually?
      placeholder: "Example: my machine has lots of leftovers from X that the tool doesn't scan yet..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: Describe how you imagine the feature working
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools/approaches you tried and why they fell short
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety principles
      options:
        - label: This feature respects the tool's principles - no automatic deletion; every deletion goes through checkbox + confirmation + backup
          required: true
