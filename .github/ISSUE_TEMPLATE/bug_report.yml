name: Bug report
description: The script shows red errors, misbehaves, hangs, or renders incorrectly
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. The first three fields below determine whether the bug can be reproduced — please don't skip them.
  - type: input
    id: wintrash-version
    attributes:
      label: WinTrash version
      description: Shown in the banner when the script runs, or search the file for WinTrashVersion
      placeholder: "1.3.1"
    validations:
      required: true
  - type: dropdown
    id: ps-engine
    attributes:
      label: PowerShell engine
      description: Run `$PSVersionTable.PSVersion` to check
      options:
        - Windows PowerShell 5.1
        - PowerShell 7.x
        - Both fail
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: invoke-style
    attributes:
      label: How the script was launched
      description: Important — the same bug may only appear in ONE launch mode
      options:
        - Typed .\WinTrash.ps1 in a PowerShell window
        - powershell/pwsh -File WinTrash.ps1
        - Right-click file -> Run with PowerShell
        - Other (specify in the description)
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Run `winver` to check
      placeholder: "Windows 11 Pro 23H2"
    validations:
      required: false
  - type: dropdown
    id: action
    attributes:
      label: What were you doing when the bug occurred
      options:
        - Scan
        - Clean
        - Organize Downloads
        - Temp cleanup
        - Restore
        - Scan schedule
        - Developer mode / DevTrash
        - Self-update
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description and reproduction steps
      description: What did you do, in what order, and what did you see?
      placeholder: |
        1. Ran .\WinTrash.ps1, picked English, User role
        2. Chose Clean, ticked 3 items, Enter, typed y
        3. The screen showed...
    validations:
      required: true
  - type: textarea
    id: error-text
    attributes:
      label: Verbatim error message
      description: Copy the entire red block from the console (if any)
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I tried the latest version (ran the script and accepted the update prompt)
          required: false
        - label: I searched existing issues and did not find this bug
          required: true
